<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faru</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="logo"><img src="favicon.svg" class="logo-icon" alt=""><span class="logo-accent">faru</span></h1>
    </div>
    <div class="header-right">
      <button id="btn-toggle-dojo" class="btn-ghost" style="display:none">Dojo</button>
      <button id="btn-toggle-archive" class="btn-ghost">Archive</button>
    </div>
  </header>

  <div class="goal-banner" id="goal-banner">
    <span class="goal-label">This week</span>
    <span class="goal-text" id="goal-text" contenteditable="true" data-placeholder="Set a weekly goal…"></span>
  </div>

  <main class="board" id="board">
    <div class="column" data-status="todo">
      <div class="column-header">
        <span class="column-dot dot-todo"></span>
        <h2>Todo</h2>
        <span class="column-count" id="count-todo">0</span>
        <button class="btn-column-add" data-status="todo" title="New card">+ New</button>
      </div>
      <div class="card-list" id="list-todo"></div>
    </div>
    <div class="column" data-status="wip">
      <div class="column-header">
        <span class="column-dot dot-wip"></span>
        <h2>WIP</h2>
        <span class="column-count" id="count-wip">0</span>
        <button class="btn-column-add" data-status="wip" title="New card">+ New</button>
      </div>
      <div class="card-list" id="list-wip"></div>
    </div>
    <div class="column" data-status="done">
      <div class="column-header">
        <span class="column-dot dot-done"></span>
        <h2>Done</h2>
        <span class="column-count" id="count-done">0</span>
        <button class="btn-column-add" data-status="done" title="New card">+ New</button>
      </div>
      <div class="card-list" id="list-done"></div>
    </div>
  </main>

  <!-- Dojo View (hidden by default) -->
  <div class="dojo-view" id="dojo-view" style="display:none">
    <aside class="dojo-sidebar">
      <div class="dojo-sidebar-header">
        <h2 class="dojo-sidebar-title">Kata</h2>
        <button class="btn-sidebar-add" id="btn-new-kata-sidebar" title="New kata">+ New</button>
      </div>
      <div class="dojo-sidebar-list" id="dojo-sidebar-list"></div>
    </aside>
    <div class="dojo-main">
      <div class="dojo-main-header">
        <h2 class="dojo-title">Sweep Log</h2>
      </div>
      <div class="dojo-timeline" id="dojo-timeline">
        <div class="dojo-empty">No sweeps yet. Create a kata to get started.</div>
      </div>
    </div>
  </div>

  <!-- Manage Kata Modal -->
  <div class="modal-overlay" id="kata-manage-overlay">
    <div class="modal modal-kata-manage">
      <div class="modal-header">
        <h3>Manage Kata</h3>
        <button class="modal-close" id="kata-manage-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="kata-list" id="kata-list"></div>
      <div class="kata-new-form">
        <h4 class="kata-form-title">New Kata</h4>
        <form id="new-kata-form" class="modal-form">
          <label>
            Name
            <input type="text" name="name" required placeholder="e.g. gardener-sweep">
          </label>
          <label>
            Schedule
            <input type="text" name="schedule" required placeholder="e.g. 0 2 * * 1">
            <span class="kata-schedule-hint">0 2 * * 1 (Mon 2am) · 0 3 * * * (daily 3am) · 0 */6 * * * (every 6h)</span>
          </label>
          <label>
            Prompt
            <textarea name="prompt" rows="5" required placeholder="Act as @[docs/skills/software-gardener.md]. Run a full sweep of backend..."></textarea>
          </label>
          <button type="submit" class="btn btn-primary btn-full">Create</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Sweep Detail Modal -->
  <div class="modal-overlay" id="sweep-detail-overlay">
    <div class="modal modal-sweep-detail">
      <div class="modal-header">
        <h3 id="sweep-detail-title"></h3>
        <button class="modal-close" id="sweep-detail-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="sweep-detail-content" id="sweep-detail-content"></div>
      <div class="sweep-detail-actions">
        <button class="btn" id="sweep-detail-open">📝 Open in Editor</button>
      </div>
    </div>
  </div>

  <!-- New Card Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>New Card</h3>
        <button class="modal-close" id="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="new-card-form" class="modal-form">
        <label>
          Title
          <input type="text" name="title" required autofocus placeholder="e.g. Update landing page copy">
        </label>
        <label>
          Description
          <textarea name="description" rows="2" placeholder="Short summary of what this card is about"></textarea>
        </label>
        <label>
          Type
          <select name="type" id="new-card-type">
          </select>
        </label>
        <label>
          Assigned
          <select name="assigned" id="new-card-assigned">
            <option value="">Unassigned</option>
          </select>
        </label>
        <button type="submit" class="btn btn-primary btn-full">Create</button>
      </form>
    </div>
  </div>

  <!-- Card Detail Modal -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal modal-detail">
      <!-- Title Bar -->
      <div class="detail-primary">
        <div class="modal-header">
          <h3 id="detail-title" contenteditable="true"></h3>
          <button class="modal-close" id="detail-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <!-- Side-by-Side: Description + Sidebar -->
      <div class="detail-split">
        <!-- Left: Description + Files + Comments -->
        <div class="detail-left">
          <div class="detail-description-zone">
            <label class="detail-section-label">Description</label>
            <div class="detail-body" id="detail-body" contenteditable="true" data-placeholder="Add a description…"></div>
          </div>
          <div class="detail-progress" id="detail-progress"></div>
          <div class="detail-milestones-zone" id="detail-milestones-zone">
            <div class="detail-milestones" id="detail-milestones"></div>
            <div class="detail-milestone-input" id="detail-milestone-input" style="display:none;">
              <input type="text" id="milestone-title-input" placeholder="Milestone title…">
              <input type="text" id="milestone-prefix-input" placeholder="Prefix (e.g. VX)" style="display:none;" maxlength="8">
              <button class="btn btn-comment" id="milestone-submit">Add</button>
            </div>
            <button class="btn-add-task" id="add-milestone-toggle">+ Add task</button>
          </div>
          <div class="detail-comments-zone" id="detail-comments-zone">
            <div class="detail-comments" id="detail-comments"></div>
            <div class="detail-comment-input" id="detail-comment-input" style="display:none;">
              <textarea id="comment-input" rows="1" placeholder="Add a comment…"></textarea>
              <button class="btn btn-comment" id="comment-submit" disabled>Comment</button>
            </div>
            <button class="btn-add-comment" id="add-comment-toggle">+ Add comment</button>
          </div>
        </div>

        <!-- Right: Metadata Sidebar -->
        <div class="detail-sidebar">
          <div class="detail-sidebar-row">
            <span class="detail-sidebar-label">Type</span>
            <select class="detail-sidebar-select" id="detail-type">
            </select>
          </div>
          <div class="detail-sidebar-row">
            <span class="detail-sidebar-label">Status</span>
            <select class="detail-sidebar-select" id="detail-status">
              <option value="todo">Todo</option>
              <option value="wip">WIP</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="detail-sidebar-row">
            <span class="detail-sidebar-label">Assigned</span>
            <select class="detail-sidebar-select" id="detail-assigned">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div class="detail-sidebar-row">
            <span class="detail-sidebar-label">Created</span>
            <span class="detail-sidebar-value" id="detail-created">—</span>
          </div>
          <div class="detail-sidebar-row">
            <span class="detail-sidebar-label">Edited</span>
            <span class="detail-sidebar-value" id="detail-edited">—</span>
          </div>
          <div class="detail-sidebar-spacer"></div>
          <div class="detail-files-zone">
            <div class="detail-files" id="detail-files"></div>
          </div>
          <div class="detail-files-zone">
            <div class="detail-linked" id="detail-linked"></div>
          </div>
          <div class="detail-sidebar-actions">
            <button class="btn btn-primary btn-dispatch" id="detail-dispatch" style="display:none">🤖 Dispatch to Agent</button>
            <button class="btn btn-open" id="detail-open">📝 Open in Editor</button>
            <button class="btn btn-danger-subtle" id="detail-archive">Archive</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dispatch Modal -->
  <div class="modal-overlay" id="dispatch-overlay">
    <div class="modal modal-dispatch">
      <div class="modal-header">
        <h3 id="dispatch-title">🤖 Dispatch</h3>
        <button class="modal-close" id="dispatch-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="dispatch-availability checking" id="dispatch-availability">
        <span class="dispatch-availability-dot"></span>
        <span id="dispatch-availability-text">Checking agent…</span>
      </div>

      <div class="dispatch-context" id="dispatch-context">
        <label class="detail-section-label">Card context (sent to agent)</label>
        <div class="dispatch-context-text" id="dispatch-context-text"></div>
      </div>

      <div class="dispatch-chain-zone">
        <label class="detail-section-label">Skill chain</label>
        <div class="dispatch-chain" id="dispatch-chain"></div>
        <div class="dispatch-add-skill">
          <select id="dispatch-skill-select" class="dispatch-skill-dropdown">
            <option value="">+ Add skill</option>
          </select>
        </div>
      </div>

      <div class="dispatch-hint">Each skill runs in a fresh session. Outputs go to the card folder.</div>

      <div class="dispatch-actions">
        <button class="btn" id="dispatch-cancel">Cancel</button>
        <button class="btn btn-primary" id="dispatch-start" disabled>▶ Start dispatch</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Live-reload via SSE — soft refresh (re-fetch cards, don't nuke modals)
    const es = new EventSource('/api/live-reload');
    es.onmessage = (e) => {
      if (e.data === 'reload') fetchCards();
    };
  </script>
</body>
</html>
